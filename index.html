<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
		<link rel="preconnect" href="https://fonts.gstatic.com">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap" rel="stylesheet"> 
		<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
		<link rel="stylesheet" href="/CSS/style.css" />
		<title>Frontend Mentor | Huddle landing page with single introductory section</title>
	</head>
	<body>
		<div class="container">
			<header class="header">
				<img src="/images/logo.svg" alt="Huddle" class="header_logo" />
			</header>

			<main class="main">
				<div class="main_image">
					<img src="/images/illustration-mockups.svg" alt="" class="main_image_image" />
				</div>
				<div class="main_text">
					<h1 class="main_text_heading">Build The Community<br />Your Fans Will Love</h1>
					<p class="main_text_paragraph">
						Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections
						with your users as you engage in genuine discussion.
					</p>
					<button class="main_text_cta">Register</button>
				</div>
			</main>
<a href=""></a>
			<div class="social">
				<button class="social_container"><i class="fab fa-facebook-f"></i></button>
				<button class="social_container"><i class="fab fa-twitter"></i></button>
				<button class="social_container"><i class="fab fa-instagram"></i></button>
			</div>
		</div>		
	</body>
</html>
